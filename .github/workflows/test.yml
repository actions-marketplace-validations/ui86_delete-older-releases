name: Test Delete Older Releases

on:
  workflow_dispatch:
    inputs:
      keep_latest:
        description: '测试保留最新的个数 (Number of latest releases to keep)'
        required: true
        default: '3'

jobs:
  test-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Run Delete Older Releases Action
        uses: ui86/delete-older-releases@v1
        with:
          keep_latest: ${{ inputs.keep_latest }}
          delete_tags: false
          delete_prerelease_only: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
